<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlowRoads 3D - Next Level Graphics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; color: white; text-shadow: 0px 2px 10px rgba(0,0,0,0.8); z-index: 10; pointer-events: none; }
        #score { font-size: 48px; font-weight: bold; background: linear-gradient(to bottom, #fff, #bbb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #mph { font-size: 20px; opacity: 0.8; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0,0,0,0.7); pointer-events: none; z-index: 5; }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="ui">
        <div id="score">0</div>
        <div id="mph">mph</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        let scene, camera, renderer, car, envGroup, composer;
        let score = 0, speed = 1.1, baseSpeed = 1.1, targetX = 0;

        function init() {
            // 1. SCENE, CAMERA, RENDERER
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x95c6e8); // Soft sky blue
            scene.fog = new THREE.FogExp2(0x95c6e8, 0.007); // Exponential fog for realism

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15); // Dynamic perspective

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); // Sharpness
            renderer.shadowMap.enabled = true; // Shadows
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.outputEncoding = THREE.sRGBEncoding; // Gamma correction
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Cinematic lighting
            document.body.appendChild(renderer.domElement);

            // 2. ADVANCED LIGHTING
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // Global soft light
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfff5e1, 1.2); // Warm sun
            sunLight.position.set(20, 40, 30);
            sunLight.castShadow = true;
            // High-res shadows
            sunLight.shadow.mapSize.width = 2048; 
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 100;
            sunLight.shadow.camera.left = -30;
            sunLight.shadow.camera.right = 30;
            sunLight.shadow.camera.top = 30;
            sunLight.shadow.camera.bottom = -30;
            scene.add(sunLight);

            // 3. ENV GROUP (Road, Terrain, Trees)
            envGroup = new THREE.Group();
            scene.add(envGroup);
            createNextLevelEnvironment();

            // 4. NEXT LEVEL CAR
            createSportsCar();

            // 5. POST-PROCESSING (BLOOM EFFECT)
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            
            // Subtle bloom for lights and bright reflections
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.6; // High pass
            bloomPass.strength = 0.3; // Bloom intensity
            bloomPass.radius = 0.1; // Bloom spread
            composer.addPass(bloomPass);

            // 6. CONTROLS & RESIZE
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', handleInput);
            
            animate();
        }

        function createNextLevelEnvironment() {
            // Road with textured look (rough asphalt)
            const roadGeo = new THREE.PlaneGeometry(16, 2000, 1, 100);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x222222, flatShading: true, shininess: 5 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            envGroup.add(road);

            // White Road Markings (Glowing slightly)
            for(let i = 0; i < 100; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 8), new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.05, -i * 20);
                envGroup.add(line);
            }

            // Hilly Grass Terrain (using noise simulation)
            for(let i = 0; i < 40; i++) {
                const hillWidth = 30 + Math.random() * 20;
                const hillGeo = new THREE.ConeGeometry(hillWidth, 15 + Math.random() * 10, 32);
                const hillMat = new THREE.MeshPhongMaterial({ color: Math.random() > 0.5 ? 0x245422 : 0x2c6e2a, flatShading: true });
                const hill = new THREE.Mesh(hillGeo, hillMat);
                hill.position.set(Math.random() > 0.5 ? 30 + Math.random() * 20 : -30 - Math.random() * 20, 7.5, -i * 25 - Math.random() * 10);
                hill.receiveShadow = true;
                hill.castShadow = true;
                envGroup.add(hill);
            }

            // High-Polygonal Trees
            for(let i = 0; i < 60; i++) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 2, 16), new THREE.MeshPhongMaterial({ color: 0x5d4037 }));
                trunk.castShadow = true;
                tree.add(trunk);

                // Cone-shaped leaves
                const leavesMat = new THREE.MeshPhongMaterial({ color: 0x1e6e3d, flatShading: true });
                const leavesBottom = new THREE.Mesh(new THREE.ConeGeometry(2, 4, 16), leavesMat);
                leavesBottom.position.y = 2.5;
                leavesBottom.castShadow = true;
                tree.add(leavesBottom);

                tree.position.set(Math.random() > 0.5 ? 12 + Math.random() * 15 : -12 - Math.random() * 15, 1, -i * 16 - Math.random() * 5);
                envGroup.add(tree);
            }
        }

        function createSportsCar() {
            car = new THREE.Group();

            const pMat = (color) => new THREE.MeshPhysicalMaterial({ color: color, metalness: 0.9, roughness: 0.2, clearcoat: 1.0, clearcoatRoughness: 0.1 });
            const sMat = (color) => new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.4 });

            // Car Body (Low Profile Sports Car)
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 5, 2, 2, 2), pMat(0xe74c3c)); // Crimson Red
            body.position.y = 0.7;
            body.castShadow = true;
            car.add(body);

            // Aerodynamic Roof/Cabin
            const cabinGeo = new THREE.BoxGeometry(1.8, 0.6, 2.5);
            cabinGeo.translate(0, 0, -0.4); // Shift cabin backward
            const cabin = new THREE.Mesh(cabinGeo, pMat(0xe74c3c));
            cabin.position.set(0, 1.35, 0.1);
            car.add(cabin);

            // Tinted Windows
            const winMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 1.0, roughness: 0.0, opacity: 0.85, transparent: true, clearcoat: 1.0 });
            
            // Windshield
            const wind = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.2), winMat);
            wind.rotation.x = -Math.PI / 6;
            wind.position.set(0, 1.3, 1.3);
            car.add(wind);

            // Headlights (Lamps only, will glow with bloom)
            const headMat = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false });
            const headlightL = new THREE.Mesh(new THREE.CircleGeometry(0.2, 16), headMat);
            headlightL.position.set(-0.8, 0.8, 2.51);
            car.add(headlightL);
            const headlightR = headlightL.clone();
            headlightR.position.x = 0.8;
            car.add(headlightR);

            // Tail lights (Will glow red)
            const tailMat = new THREE.MeshBasicMaterial({ color: 0xff3333, fog: false });
            const taillight = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.15), tailMat);
            taillight.position.set(0, 0.8, -2.51);
            car.add(taillight);

            // Wheels (Gloss Black)
            const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.6, 24);
            const wheelMat = sMat(0x111111);
            const tire = new THREE.Mesh(wheelGeo, wheelMat);
            tire.rotation.z = Math.PI / 2;

            for(let i=0; i<4; i++) {
                const w = tire.clone();
                w.castShadow = true;
                w.position.set(i < 2 ? 1.2 : -1.2, 0.5, i % 2 == 0 ? 1.8 : -1.8);
                car.add(w);
            }

            scene.add(car);
        }

        function handleInput(e) {
            const step = 2.5; // Steer sensitivity
            if(e.key === "ArrowLeft" && targetX > - step * 2) targetX -= step;
            if(e.key === "ArrowRight" && targetX < step * 2) targetX += step;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight); // Post processing resize
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth Steering Lerp (Next Level feel)
            car.position.x = THREE.MathUtils.lerp(car.position.x, targetX, 0.08);
            car.rotation.y = THREE.MathUtils.lerp(car.rotation.y, (car.position.x - targetX) * 0.05, 0.1);
            car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, (car.position.x - targetX) * 0.02, 0.1);

            // Velocity simulation for Environment
            const velocity = (speed - (Math.abs(car.position.x) * 0.02)) * 1.0; 
            envGroup.children.forEach(obj => {
                obj.position.z += velocity;
                // Seamless endless reset
                if(obj.position.z > 20) {
                    obj.position.z -= 800; // Reset far back
                }
            });

            // Score & dynamic speed up
            score += Math.floor(speed * 10);
            document.getElementById('score').innerText = score.toLocaleString();
            document.getElementById('mph').innerText = Math.floor(speed * 110) + " mph";
            speed = THREE.MathUtils.lerp(speed, baseSpeed + (score * 0.00001), 0.01); // Slowly gets faster

            // Cinematic Camera Follow
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, car.position.x * 0.4, 0.05);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, 15 - (speed * 0.5), 0.02); // Adjust distance with speed
            camera.lookAt(car.position.x * 0.5, 2, car.position.z - 5);

            // Renderer with Post Processing
            composer.render();
        }

        init();
    </script>
</body>
</html>
